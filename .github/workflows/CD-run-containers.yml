name: CD Pipeline - Deploy to ACI

on:
  push:
    branches: 
    - "**"
  # workflow_run:
  #   workflows: ["CI Pipeline - Build Docker Images"]
  #   types:
  #     - completed

jobs:
  deploy:
    # if: |
    #   github.event_name == 'push' ||
    #   (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to ACI using container spec
        run: |
          az container create \
            --resource-group banana-project-rg \
            --file container_spec.yml